<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulse — Tech News Aggregator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="container header-inner">
      <a class="brand" href="/">
        <span class="brand-mark">
          <svg viewBox="0 0 24 24" fill="none" width="22" height="22"><path d="M3 12h4l3-8 4 16 3-8h4" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </span>
        <div class="brand-text">
          <h1>Pulse</h1>
          <span class="brand-sub">Tech news, ranked.</span>
        </div>
      </a>

      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" width="16" height="16"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="m20 20-3.5-3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <input
          id="search"
          type="search"
          placeholder="Search articles…"
          autocomplete="off"
          spellcheck="false"
        />
        <kbd class="kbd">/</kbd>
      </div>

      <nav class="view-toggle" role="tablist">
        <button class="tab" data-view="ranked" aria-pressed="true">
          <svg viewBox="0 0 24 24" fill="none" width="14" height="14"><path d="M12 2v4M4 7l3 3M20 7l-3 3M5 13a7 7 0 1 0 14 0 7 7 0 0 0-14 0Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          Ranked
        </button>
        <button class="tab" data-view="latest" aria-pressed="false">
          <svg viewBox="0 0 24 24" fill="none" width="14" height="14"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/><path d="M12 7v5l3 2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          Latest
        </button>
      </nav>
    </div>
  </header>

  <section class="toolbar">
    <div class="container toolbar-inner">
      <div id="source-chips" class="chips">
        <button class="chip active" data-source="">All</button>
      </div>
      <div class="actions">
        <span id="status" class="status"></span>
        <button id="btn-refresh" class="btn btn-ghost" title="Refresh">
          <svg viewBox="0 0 24 24" fill="none" width="14" height="14"><path d="M21 12a9 9 0 1 1-3-6.7L21 8M21 3v5h-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Refresh
        </button>
        <button id="btn-ingest" class="btn btn-primary" title="Fetch latest from all sources">
          <svg viewBox="0 0 24 24" fill="none" width="14" height="14"><path d="M12 3v12m0 0-4-4m4 4 4-4M4 21h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Ingest
        </button>
      </div>
    </div>
  </section>

  <main class="container main-area">
    <div id="stats" class="stats-bar"></div>
    <div id="error" class="error hidden"></div>
    <div id="loading" class="skeleton-list">
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>
    <ol id="article-list" class="article-list hidden"></ol>
    <div id="loading-more" class="loading-more hidden">Loading more…</div>
    <div id="end-of-list" class="end-of-list hidden">— end of feed —</div>
    <div id="empty" class="empty hidden">
      <div class="empty-icon">📰</div>
      <h3>No articles yet</h3>
      <p>Click <strong>Ingest</strong> to fetch the latest tech news from all sources.</p>
    </div>
  </main>

  <!-- Article detail modal -->
  <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-backdrop" data-close></div>
    <article class="modal-card">
      <button class="modal-close" data-close aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" width="20" height="20"><path d="m6 6 12 12M18 6 6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <div class="modal-body">
        <div class="modal-meta">
          <span id="modal-source" class="source-pill"></span>
          <span class="meta-dot">·</span>
          <span id="modal-domain" class="modal-domain"></span>
          <span class="meta-dot">·</span>
          <span id="modal-time"></span>
        </div>
        <h2 id="modal-title" class="modal-title"></h2>
        <p id="modal-summary" class="modal-summary"></p>
        <div class="modal-stats">
          <div class="stat"><span class="stat-label">Score</span><span id="modal-score" class="stat-value"></span></div>
          <div class="stat"><span class="stat-label">Rank</span><span id="modal-rank" class="stat-value"></span></div>
          <div class="stat"><span class="stat-label">Source</span><span id="modal-source-2" class="stat-value"></span></div>
        </div>
        <a id="modal-link" class="btn btn-primary modal-cta" href="#" target="_blank" rel="noopener noreferrer">
          Read original article
          <svg viewBox="0 0 24 24" fill="none" width="14" height="14"><path d="M7 17 17 7M9 7h8v8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </a>
      </div>
    </article>
  </div>

  <footer class="app-footer">
    <div class="container">
      <span>FastAPI · SQLAlchemy · rapidfuzz · Redis · Celery</span>
      <span class="dot">·</span>
      <a href="/docs" target="_blank">API docs ↗</a>
    </div>
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>
